/**
 * DS Vault — Save State Manager
 * Gestion des états de sauvegarde par jeu (IndexedDB)
 */

const STORE_SAVES = 'saves';

class SaveManager {
  constructor() {
    this._ready = this._initDB();
  }

  _initDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DS_DB_NAME, DS_DB_VERSION);

      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_SAVES)) {
          const store = db.createObjectStore(STORE_SAVES, { keyPath: 'id' });
          store.createIndex('romId', 'romId', { unique: false });
          store.createIndex('savedAt', 'savedAt', { unique: false });
        }
      };

      req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
      req.onerror   = (e) => reject(e.target.error);
    });
  }

  async ready() { await this._ready; }

  /** Créer un état de sauvegarde */
  async createState({ romId, romName, label, data, screenshot }) {
    await this.ready();
    return new Promise((resolve, reject) => {
      const id = `save_${romId}_${Date.now()}`;
      const record = { id, romId, romName, label, data, screenshot, savedAt: Date.now() };

      const tx = this.db.transaction(STORE_SAVES, 'readwrite');
      tx.objectStore(STORE_SAVES).put(record);
      tx.oncomplete = () => resolve(record);
      tx.onerror    = (e) => reject(e.target.error);
    });
  }

  /** Lister tous les états pour une ROM */
  async listStates(romId) {
    await this.ready();
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_SAVES, 'readonly');
      const idx = tx.objectStore(STORE_SAVES).index('romId');
      const req = idx.getAll(romId);
      req.onsuccess = () => resolve(req.result.sort((a, b) => b.savedAt - a.savedAt));
      req.onerror   = (e) => reject(e.target.error);
    });
  }

  /** Lister tous les états (pour la page bibliothèque) */
  async listAllStates() {
    await this.ready();
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_SAVES, 'readonly');
      const req = tx.objectStore(STORE_SAVES).getAll();
      req.onsuccess = () => resolve(req.result.sort((a, b) => b.savedAt - a.savedAt));
      req.onerror   = (e) => reject(e.target.error);
    });
  }

  /** Récupérer un état */
  async getState(id) {
    await this.ready();
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_SAVES, 'readonly');
      const req = tx.objectStore(STORE_SAVES).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror   = (e) => reject(e.target.error);
    });
  }

  /** Supprimer un état */
  async deleteState(id) {
    await this.ready();
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_SAVES, 'readwrite');
      tx.objectStore(STORE_SAVES).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror    = (e) => reject(e.target.error);
    });
  }

  /** Exporter un état comme fichier JSON téléchargeable */
  exportState(state) {
    const json = JSON.stringify(state);
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${state.romName}_${state.label}_${new Date(state.savedAt).toISOString().slice(0,10)}.dsvault`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  /** Exporter tous les états */
  async exportAll() {
    const all = await this.listAllStates();
    if (!all.length) { alert('Aucune sauvegarde à exporter.'); return; }
    const json = JSON.stringify({ version: 1, saves: all, exportedAt: Date.now() });
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `DSVault_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  /** Importer des états depuis un fichier JSON */
  async importBackup(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = JSON.parse(e.target.result);
          const saves = data.saves || [];
          let count = 0;
          for (const s of saves) {
            await this._putState(s);
            count++;
          }
          resolve(count);
        } catch (err) {
          reject(err);
        }
      };
      reader.readAsText(file);
    });
  }

  async _putState(record) {
    await this.ready();
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(STORE_SAVES, 'readwrite');
      tx.objectStore(STORE_SAVES).put(record);
      tx.oncomplete = () => resolve();
      tx.onerror    = (e) => reject(e.target.error);
    });
  }
}

window.saveManager = new SaveManager();
